# Configuration nginx HÔTE - Reverse proxy vers conteneur
# À copier dans /etc/nginx/sites-available/ puis symlink vers sites-enabled

server {
    listen 80;
    server_name tunnel-gmao.local;  # Adapter selon votre domaine

    # Logs
    access_log /var/log/nginx/tunnel-gmao-access.log;
    error_log /var/log/nginx/tunnel-gmao-error.log;

    # -----------------------------------------------------------------------
    # index.html et racine SPA — jamais mis en cache ni côté proxy ni navigateur
    # Le navigateur redemande toujours ce fichier → il obtient les nouvelles
    # URLs d'assets hashés générées par Vite à chaque build.
    # -----------------------------------------------------------------------
    location = /index.html {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Désactiver le cache proxy côté serveur
        proxy_no_cache 1;
        proxy_cache_bypass 1;

        # Forcer le navigateur à revalider à chaque visite
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    # -----------------------------------------------------------------------
    # Assets statiques hashés (/assets/...) — cache navigateur 1 an
    # Vite génère un hash dans le nom de fichier : si le code change, l'URL
    # change → le navigateur charge automatiquement le nouveau fichier.
    # -----------------------------------------------------------------------
    location ^~ /assets/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # -----------------------------------------------------------------------
    # Toutes les autres routes (SPA fallback) — pas de cache
    # -----------------------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Désactiver le cache proxy côté serveur
        proxy_no_cache 1;
        proxy_cache_bypass 1;

        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }
}
